<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportChain Pro | Certification Blockchain</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-container">
      <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask" width="60" />
        <h1>SportChain Pro</h1>
        <p class="text-muted">Authentification via Ethereum</p>
        <button id="connectButton" class="primary-action mt-10">Se connecter</button>
      </div>
    </div>

    <div id="appArea" class="app-layout hidden">
      <header class="top-nav">
        <div class="logo">SPORTCHAIN PRO <span class="user-name">| Certification Officielle</span></div>
        <div id="accountArea" class="user-pill">Non connecté</div>
      </header>

      <main class="content-area">
        <section id="block-athlete" class="card central-card hidden">
          <div class="flex-row" style="justify-content: space-between">
            <h2 id="athleteWelcome">Tableau de bord</h2>
            <div class="user-pill">Athlète Certifié</div>
          </div>
          <div id="myAttestationsProfile" class="nft-grid mt-10"></div>
          
          <div class="shop-container mt-10">
            <h3>✨ Boutique de Prestige</h3>
            <div class="nft-grid">
              <div class="card shop-item">
                <h4>Pack "Légende Or"</h4>
                <p class="text-muted">Fini doré pour vos certificats.</p>
                <div class="price-tag">0.01 ETH</div>
                <button onclick="purchaseTheme(1)" class="primary-action">Acheter</button>
              </div>
            </div>
          </div>
        </section>

        <section id="block-coach" class="grid-admin hidden">
            </section>

        <section id="block-admin" class="grid-admin hidden">
            </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
